<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <header><h1>Your To-Do</h1></header>
    <div id = "login">
        <form>
            <p>Sign In or Log in</p>
            
            <input type="radio" id = "btn_log" name="log_opt" value="val_log">
            <label for="btn_log">Login</label><br>

            <input type="radio" id="btn_sign" name="log_opt" value = "sign_log">
            <label for="btn_sign">Sign In</label><br>

        </form>


        <input id = "email" type="email" placeholder="Enter your email" class="login_in">
        <input id = "password" type="password" placeholder="Enter your password" class="login_in">
        <button id = "submit">Submit</button>
    
    </div>
    <h1 id = "error">ERROR: Wrong Email or Password</h1>
    <p>To Delete a task you must choose delete option and write id of your task, the id starts from 1</p>
    <main>
        <div id = "elem_btn">
            <form>
                <p>Add or Delete</p>
                
                <input type="radio" id="add_opt" name="task_opt" value="add_task">
                <label for="add_opt">Add</label><br>

                <input type="radio" id="del_opt" name="task_opt" value="del_task">
                <label for="del_opt">Delete</label><br>

            </form>
        </div>
        <input type = "text" id ="task_name" placeholder="Task Name to either Delete or Add">
        <button id = 'task_sub'>Submit</button>
        
    </main>
    <div id = "tasks">
        
    </div>
    
    <script src="script.js" defer></script>
</body>
</html>
